<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sokoban</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Sokoban</h1>
  <h3>Move with arrow keys or buttons. Push all boxes into the goals to win.</h3>
  <div id="game"></div>

  <div class="controls">
    <button id="up">↑</button>
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>

  <div class="ranking">
    <button id="next">Next</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
